<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Viewer | Lesson Control</title>
  <link rel="stylesheet" href="./src/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Space Grotesk', sans-serif; }
      
  
    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
      color: #e5e7eb;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    img, svg {
      max-width: 100%;
    }
    .brand-logo svg, .logo-mark svg, .module-icon svg, .card-icon svg {
      width: 28px;
      height: 28px;
      display: block;
      flex-shrink: 0;
    }

  </style>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-slate-950 text-slate-300 flex flex-col min-h-screen selection:bg-rose-500/30 selection:text-rose-200">

  <header class="bg-slate-950/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-4">
          <a href="./index.html" id="back-button" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 px-3 py-1.5 rounded-md hover:bg-slate-800 font-mono text-xs uppercase tracking-widest" title="Back">
            <svg class="w-4 h-4" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span id="back-label" class="hidden sm:inline">Back</span>
          </a>
          <a href="./index.html" class="flex items-center gap-2.5">
            <svg class="w-6 h-6 text-rose-500" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            <div class="flex flex-col hidden sm:flex">
              <span class="font-display font-bold text-lg tracking-tight text-white leading-none">Lesson Control</span>
              <span class="text-[9px] uppercase tracking-widest font-mono text-slate-500 leading-none mt-1">GYTama EDU</span>
            </div>
          </a>
        </div>
        <div class="flex items-center gap-3" id="lesson-meta-header">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow py-8 sm:py-12 relative overflow-hidden bg-slate-950">
    <!-- Subtle background accent -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-64 bg-rose-500/5 blur-[100px] pointer-events-none"></div>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      <div id="lesson-content" class="bg-slate-900/80 backdrop-blur rounded-2xl shadow-2xl shadow-black/40 border border-slate-800 overflow-hidden relative">
        <!-- Content injected via JS -->
        <div class="p-8 text-center text-slate-500 font-mono text-sm uppercase tracking-widest">
          Loading lesson...
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-slate-950 border-t border-slate-900 text-slate-600 py-8 text-center text-xs font-mono">
    &copy; 2026 GYTama EDU. Lesson Control.
  </footer>

  <script type="module" src="./scripts/lesson.js"></script>
</body>
</html>
